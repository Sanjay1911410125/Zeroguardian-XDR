<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #081c34, #000814);
            font-family: Arial, sans-serif;
            color: #e6faff;
        }

        .card {
            width: 420px;
            padding: 30px;
            border-radius: 16px;
            background: rgba(10, 20, 40, 0.92);
            box-shadow: 0 0 30px rgba(0, 234, 255, 0.25);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        p {
            text-align: center;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: #0c1c34;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: #00eaff;
            box-shadow: 0 0 8px rgba(0,234,255,0.4);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #00eaff;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #00c4d6;
        }

        .error {
            margin-top: 10px;
            color: #ff5c5c;
            text-align: center;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #00eaff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Reset Password</h2>
    <p>Enter OTP shown in terminal</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="otp" placeholder="Enter OTP" required>
        <input name="new_password" type="password" placeholder="New Password" required>
        <button type="submit">Reset Password</button>
    </form>

    <a href="{{ url_for('login') }}">Back to Login</a>
</div>

</body>
</html>
