{% extends "auth_base.html" %}
{% set title="ZeroGuardian-XDR | Activate Account" %}

{% block content %}
  <div class="zg-title2">Activate Account</div>
  <div class="zg-s mt-1">{{ msg }}</div>

  {% if error %}<div class="mt-3 text-red-300 text-sm font-semibold">{{ error }}</div>{% endif %}

  <form method="POST" class="mt-5 space-y-3">
    <input name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required placeholder="Enter OTP"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none"/>

    <input name="new_password" type="password" required placeholder="New Password (min 6 chars)"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none"/>

    <input name="confirm_password" type="password" required placeholder="Confirm Password"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none"/>

    <button class="zg-auth-btn w-full" type="submit">Activate</button>
  </form>

  <div class="mt-4 text-sm text-slate-400">
    <a class="zg-auth-link" href="/login">← Back to Login</a>
  </div>
{% endblock %}
