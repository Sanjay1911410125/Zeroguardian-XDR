{% extends "auth_base.html" %}
{% set title="ZeroGuardian-XDR | Verify OTP" %}
{% set header="Verify OTP" %}

{% block content %}
<div class="zg-card zg-pad" style="max-width:520px">
  <div class="zg-title2">OTP Verification</div>
  <div class="zg-s">Enter the 6-digit OTP (valid 5 minutes).</div>

  {% if error %}<div class="mt-3 text-red-300 text-sm font-semibold">{{ error }}</div>{% endif %}
  {% if msg %}<div class="mt-3 text-cyan-200 text-sm font-semibold">{{ msg }}</div>{% endif %}

  <form method="POST" class="mt-4 space-y-3">
    <input name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required placeholder="Enter OTP"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none"/>
    <button class="zg-iconbtn w-full justify-center" style="display:flex" type="submit">Verify OTP</button>
  </form>

  <div class="mt-4 text-sm text-slate-400">
    <a class="zg-link" href="/forgot-password">Resend OTP</a>
  </div>
</div>
{% endblock %}
