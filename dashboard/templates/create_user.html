{% extends "base.html" %}
{% set header="Create User" %}

{% block content %}
<div class="zg-card zg-pad" style="max-width:620px">
  <div class="zg-title2">Admin • Create New User</div>
  <div class="zg-s">Create user account with email. Password will be set via OTP activation.</div>

  {% if error %}<div class="mt-3 text-red-300 text-sm font-semibold">{{ error }}</div>{% endif %}
  {% if msg %}<div class="mt-3 text-green-300 text-sm font-semibold">{{ msg }}</div>{% endif %}

  <form method="POST" class="mt-5 space-y-3">
    <input name="username" required placeholder="Username (eg: analyst1)"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none"/>

    <input name="email" type="email" required placeholder="Email (eg: analyst1@gmail.com)"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none"/>

    <select name="role"
      class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-700/40 outline-none">
      <option value="analyst">Analyst</option>
      <option value="viewer">Viewer</option>
      <option value="admin">Admin</option>
    </select>

    <button class="zg-iconbtn w-full justify-center" style="display:flex" type="submit">
      Create & Send Activation OTP
    </button>
  </form>

  <div class="mt-4 text-sm text-slate-400">
    Activation page: <span class="text-cyan-200">/activate</span>
  </div>
</div>
{% endblock %}
