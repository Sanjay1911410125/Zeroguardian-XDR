<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #0a1f3c, #000814);
            font-family: Arial, sans-serif;
            color: #e6faff;
        }

        .card {
            width: 400px;
            padding: 30px;
            border-radius: 16px;
            background: rgba(10, 20, 40, 0.9);
            box-shadow: 0 0 25px rgba(0, 234, 255, 0.2);
        }

        h2 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0c1c34;
            color: white;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #00eaff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #00eaff;
            text-decoration: none;
        }

        .error {
            margin-top: 10px;
            color: #ff4d4d;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Forgot Password</h2>
    <p>OTP will be shown in terminal (demo mode)</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="username" placeholder="Enter username" required>
        <button type="submit">Send OTP</button>
    </form>

    <a href="{{ url_for('login') }}">Back to login</a>
</div>

</body>
</html>
